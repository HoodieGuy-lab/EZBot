<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EZBot Engine Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0b0c10;
            --bg2:       #0f1117;
            --bg3:       #161922;
            --bg4:       #1c2030;
            --border:    rgba(255,255,255,0.055);
            --border2:   rgba(255,255,255,0.10);
            --accent:    #c8f135;
            --accent-dim: rgba(200,241,53,0.12);
            --red:       #ff5470;
            --red-dim:   rgba(255,84,112,0.10);
            --blue:      #5b9cf6;
            --text:      #dde2f0;
            --muted:     #5a6280;
            --muted2:    #3d4460;
            --font:      'Outfit', sans-serif;
            --mono:      'IBM Plex Mono', monospace;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
        }

        /* ── TITLE BAR ── */
        .title-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 36px;
            padding: 0 0 0 16px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            -webkit-app-region: drag;
            user-select: none;
            flex-shrink: 0;
        }

        .title-bar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .title-bolt {
            width: 14px;
            height: 14px;
            background: var(--accent);
            clip-path: polygon(62% 0%, 38% 44%, 68% 44%, 32% 100%, 56% 56%, 26% 56%);
        }

        .window-controls {
            display: flex;
            -webkit-app-region: no-drag;
            height: 100%;
        }

        .ctrl {
            width: 46px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            cursor: pointer;
            font-size: 0.7rem;
            transition: background 0.15s, color 0.15s;
        }
        .ctrl:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .ctrl.x:hover { background: var(--red); color: #fff; }

        /* ── LAYOUT ── */
        .app {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 36px);
            padding: 20px 22px 18px;
            gap: 14px;
            overflow: hidden;
        }

        /* ── TOP ROW ── */
        .top-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.15rem;
            font-weight: 800;
            letter-spacing: 0.06em;
            color: #fff;
        }

        .logo-bolt {
            width: 26px;
            height: 26px;
            background: var(--accent);
            clip-path: polygon(62% 0%, 38% 44%, 68% 44%, 32% 100%, 56% 56%, 26% 56%);
            flex-shrink: 0;
        }

        /* ── LANG TABS ── */
        .tabs {
            display: flex;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px;
            gap: 3px;
        }

        .tab {
            padding: 6px 16px;
            font-family: var(--mono);
            font-size: 0.72rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            border-radius: 6px;
            cursor: pointer;
            color: var(--muted);
            transition: all 0.18s;
            -webkit-app-region: no-drag;
        }

        .tab:hover { color: var(--text); }

        .tab.active {
            background: var(--accent);
            color: #0b0c10;
        }

        /* ── TOKEN ROW ── */
        .token-row {
            display: flex;
            align-items: center;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0 16px;
            height: 44px;
            gap: 12px;
            flex-shrink: 0;
            transition: border-color 0.2s;
        }

        .token-row:focus-within {
            border-color: rgba(200,241,53,0.3);
        }

        .token-label {
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--accent);
            white-space: nowrap;
            flex-shrink: 0;
        }

        .token-divider {
            width: 1px;
            height: 18px;
            background: var(--border2);
            flex-shrink: 0;
        }

        .token-row input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: var(--mono);
            font-size: 0.85rem;
            width: 100%;
            letter-spacing: 0.05em;
        }

        .token-row input::placeholder { color: var(--muted2); }

        /* ── EDITOR ── */
        .editor-wrap {
            flex: 1;
            min-height: 0;
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            background: #0d1117;
        }

        .editor-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(200,241,53,0.15), transparent);
            pointer-events: none;
            z-index: 1;
        }

        #editor-container {
            width: 100%;
            height: 100%;
        }

        .cm-editor { height: 100%; }
        .cm-scroller { font-family: var(--mono) !important; font-size: 13px !important; line-height: 1.7 !important; }

        /* ── BUTTONS ── */
        .btn-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .btn {
            flex: 1;
            height: 44px;
            border: none;
            border-radius: 10px;
            font-family: var(--font);
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.18s;
        }

        #startBtn {
            background: var(--accent);
            color: #0b0c10;
        }

        #startBtn:hover {
            background: #d9ff50;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(200,241,53,0.2);
        }

        #startBtn:active { transform: translateY(0); }

        #stopBtn {
            background: var(--red-dim);
            color: var(--red);
            border: 1px solid rgba(255,84,112,0.18);
            flex: 0 0 160px;
        }

        #stopBtn:hover {
            background: var(--red);
            color: #fff;
            border-color: var(--red);
            transform: translateY(-1px);
        }

        #stopBtn:active { transform: translateY(0); }

        /* ── TERMINAL ── */
        .console-wrap {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            height: 140px;
        }

        .console-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .console-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            animation: blink 2.4s ease infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.25; }
        }

        #terminal {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 16px;
            font-family: var(--mono);
            font-size: 0.78rem;
            line-height: 1.65;
            color: var(--text);
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .log-item { margin-bottom: 2px; display: flex; gap: 10px; }
        .log-ts { color: var(--muted2); flex-shrink: 0; }
        .log-info { color: var(--blue); }
        .log-success { color: var(--accent); font-weight: 600; }
        
        .log-error {
            color: var(--red);
            background: var(--red-dim);
            border-left: 2px solid var(--red);
            padding: 6px 12px;
            border-radius: 4px;
            display: block;
            margin: 3px 0;
            white-space: pre-wrap;
            width: 100%;
        }

        /* ── SCROLLBAR (terminal) ── */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--muted2); border-radius: 4px; }
    </style>
</head>
<body>

    <div class="title-bar">
        <div class="title-bar-brand">
            <div class="title-bolt"></div>
            EZBot Engine Pro
        </div>
        <div class="window-controls">
            <div class="ctrl" onclick="minimizeWindow()">—</div>
            <div class="ctrl" onclick="maximizeWindow()">⬜</div>
            <div class="ctrl x" onclick="closeWindow()">✕</div>
        </div>
    </div>

    <div class="app">

        <div class="top-row">
            <div class="logo">
                <div class="logo-bolt"></div>
                EZBOT PRO
            </div>
            <div class="tabs">
                <div class="tab active" id="jsTab" onclick="switchLanguage('javascript')">JavaScript (Node)</div>
                <div class="tab" id="pyTab" onclick="switchLanguage('python')">Python</div>
            </div>
        </div>

        <div class="token-row">
            <span class="token-label">Bot Token</span>
            <div class="token-divider"></div>
            <input type="password" id="tokenInput" placeholder="Paste your Discord bot token here…">
        </div>

        <div class="editor-wrap">
            <div id="editor-container"></div>
        </div>

        <div class="btn-row">
            <button class="btn" id="startBtn" onclick="startBot()">
                ▶ Launch Environment
            </button>
            <button class="btn" id="stopBtn" onclick="stopBot()">
                ■ Kill Process
            </button>
        </div>

        <div class="console-wrap">
            <div class="console-header">
                <div class="console-dot"></div>
                Live Console Stream
            </div>
            <div id="terminal"></div>
        </div>

    </div>

    <script>
        const { ipcRenderer } = require('electron');
        const { EditorView, basicSetup } = require('codemirror');
        const { Compartment } = require('@codemirror/state');
        const { javascript } = require('@codemirror/lang-javascript');
        const { python } = require('@codemirror/lang-python');
        const { oneDark } = require('@codemirror/theme-one-dark');

        const terminal = document.getElementById('terminal');
        let editorView;
        let languageConf = new Compartment();
        let currentLanguage = 'javascript';

        function minimizeWindow() { ipcRenderer.send('window-minimize'); }
        function maximizeWindow() { ipcRenderer.send('window-maximize'); }
        function closeWindow()    { ipcRenderer.send('window-close'); }

        const defaultTemplates = {
            javascript: `const { Client, GatewayIntentBits } = require('discord.js');\nconst client = new Client({ intents: [GatewayIntentBits.Guilds] });\n\nclient.once('ready', () => {\n    console.log('[SUCCESS] Node Bot initialized successfully!');\n    console.log(\`[INFO] Authenticated as: \${client.user.tag}\`);\n});\n\nclient.login(process.env.TOKEN);`,
            python: `import discord\nimport os\n\nclass MyClient(discord.Client):\n    async def on_ready(self):\n        print('[SUCCESS] Python Bot initialized successfully!')\n        print(f'[INFO] Authenticated as: {self.user}')\n\nintents = discord.Intents.default()\nclient = MyClient(intents=intents)\nclient.run(os.getenv('TOKEN'))`
        };

        editorView = new EditorView({
            doc: defaultTemplates.javascript,
            extensions: [basicSetup, languageConf.of(javascript()), oneDark],
            parent: document.getElementById('editor-container')
        });

        function switchLanguage(lang) {
            if (currentLanguage === lang) return;
            currentLanguage = lang;
            document.getElementById('jsTab').classList.toggle('active', lang === 'javascript');
            document.getElementById('pyTab').classList.toggle('active', lang === 'python');
            editorView.dispatch({
                changes: { from: 0, to: editorView.state.doc.length, insert: defaultTemplates[lang] },
                effects: languageConf.reconfigure(lang === 'javascript' ? javascript() : python())
            });
        }

        function startBot() {
            ipcRenderer.send('start-bot', {
                code:     editorView.state.doc.toString(),
                token:    document.getElementById('tokenInput').value,
                language: currentLanguage
            });
        }

        function stopBot() { ipcRenderer.send('stop-bot'); }

        function ts() {
            return new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }

        function appendLog(text, cls) {
            const row = document.createElement('div');
            row.className = `log-item`;
            if (cls === 'log-error') {
                row.innerHTML = `<span class="log-error">${text}</span>`;
            } else {
                row.innerHTML = `<span class="log-ts">${ts()}</span><span class="${cls}">${text}</span>`;
            }
            terminal.appendChild(row);
            terminal.scrollTop = terminal.scrollHeight;
        }

        // INTELLIGENT STREAM ROUTER FOR MULTI-LINE DIAGNOSTIC BLOCKS
        ipcRenderer.on('console-log', (event, message) => {
            if (message.includes('[🚨 SYSTEM CRASH DIAGNOSIS]')) {
                appendLog(message, 'log-error');
                return;
            }

            message.split('\n').forEach(line => {
                if (!line.trim()) return;
                if (line.includes('[SUCCESS]'))      appendLog(line, 'log-success');
                else if (line.includes('[ERROR]'))   appendLog(line, 'log-error');
                else                                 appendLog(line, 'log-info');
            });
        });
    </script>
</body>
</html>
